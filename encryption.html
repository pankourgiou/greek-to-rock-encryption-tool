<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

:root {
  --bg:      #0a0a0a;
  --bg2:     #111111;
  --border:  #2a2a2a;
  --ink:     #e0e0e0;
  --inkdim:  #888888;
  --inkfaint:#444444;
  --card-bg: #141414;
  --gold:    #d4af37;
  --radius:  4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
}

header { text-align: center; padding: 42px 20px 24px; border-bottom: 1px solid var(--border); }
header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.4rem, 4vw, 2.6rem);
  font-weight: 400; letter-spacing: 0.34em; color: var(--gold);
}
header p { margin-top: 10px; font-style: italic; color: var(--inkdim); font-size: 1rem; letter-spacing: 0.06em; font-weight: 300; }

.tabs { display: flex; justify-content: center; gap: 2px; padding: 22px 20px 0; }
.tab {
  background: transparent; border: 1px solid var(--border); border-bottom: none;
  color: var(--inkfaint); font-family: 'Cinzel', serif; font-size: 0.68rem;
  letter-spacing: 0.2em; padding: 9px 30px; cursor: pointer; transition: all 0.2s;
}
.tab:hover { color: var(--ink); border-color: var(--inkdim); }
.tab.active { color: var(--gold); border-color: var(--gold); background: var(--bg2); }

.panel { display: none; padding: 26px 20px 48px; max-width: 980px; margin: 0 auto; }
.panel.active { display: block; }

.lbl { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.22em; color: var(--inkdim); margin-bottom: 10px; }

#build-out, #type-out {
  min-height: 120px; border: 1px solid var(--border); background: var(--bg2);
  border-radius: var(--radius); padding: 16px; display: flex; flex-wrap: wrap;
  gap: 6px; align-items: flex-start; margin-bottom: 14px;
}
.ph { color: var(--inkfaint); font-style: italic; font-size: 0.9rem; align-self: center; }

.gc {
  display: flex; flex-direction: column; align-items: center;
  border: 1px solid transparent; border-radius: var(--radius);
  transition: all 0.15s; background: var(--card-bg);
}
.gc.clickable { cursor: pointer; }
.gc.clickable:hover { border-color: var(--gold); box-shadow: 0 2px 8px rgba(212,175,55,0.18); }
.gc img { width: 56px; height: 56px; display: block; border-radius: 3px; object-fit: cover; }
.sp { width: 22px; height: 56px; }

.btn-row { display: flex; gap: 8px; margin-bottom: 26px; flex-wrap: wrap; }
.btn {
  background: transparent; border: 1px solid var(--border); color: var(--inkdim);
  font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.15em;
  padding: 7px 18px; cursor: pointer; border-radius: var(--radius); transition: all 0.2s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }

#type-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.15rem;
  padding: 12px 14px; resize: vertical; min-height: 80px; outline: none;
  margin-bottom: 14px; letter-spacing: 0.06em;
}
#type-input:focus { border-color: var(--gold); }
#type-input::placeholder { color: var(--inkfaint); font-style: italic; }

#picker {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 16px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2);
}
.pc {
  display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 7px 5px;
  border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer;
  background: var(--card-bg); transition: all 0.15s; width: 80px;
}
.pc:hover { border-color: var(--gold); box-shadow: 0 2px 10px rgba(212,175,55,0.2); }
.pc img { width: 64px; height: 64px; border-radius: 3px; object-fit: cover; }
.pl { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 15px; font-weight: 400; color: var(--gold); letter-spacing: 0.04em; }
.pn { font-size: 8px; color: var(--inkfaint); text-align: center; letter-spacing: 0.03em; max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sp-key {
  align-self: center; padding: 8px 20px; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: 'Cinzel', serif; font-size: 0.62rem;
  letter-spacing: 0.15em; color: var(--inkdim); cursor: pointer; transition: all 0.15s;
}
.sp-key:hover { border-color: var(--gold); color: var(--gold); }

canvas { display: none; }
</style>
</head>
<body>
<header>
  <h1>⚡ ROCK CIPHER ⚡</h1>
  <p>Encrypt your message using band photographs · α through ω</p>
</header>

<div class="tabs">
  <button class="tab active" id="tab-build" onclick="setMode('build')">BUILD — click images</button>
  <button class="tab" id="tab-type" onclick="setMode('type')">ENCRYPT — type message</button>
</div>

<div class="panel active" id="mode-build">
  <div class="lbl">OUTPUT</div>
  <div id="build-out"><span class="ph">Click band images below to compose...</span></div>
  <div class="btn-row">
    <button class="btn" onclick="buildDelete()">DELETE</button>
    <button class="btn" onclick="buildClear()">CLEAR</button>
    <button class="btn" onclick="doDownload('build-out')">DOWNLOAD PNG</button>
  </div>
  <div class="lbl">ALPHABET — α to ω</div>
  <div id="picker"></div>
</div>

<div class="panel" id="mode-type">
  <div class="lbl">YOUR MESSAGE</div>
  <textarea id="type-input" placeholder="Type Greek letters: α β γ δ ε ζ η θ ι κ λ μ ν ξ ο π ρ σ τ υ φ χ ψ ω  or latin a–x" oninput="typeTranslate()" spellcheck="false"></textarea>
  <div class="lbl">ENCRYPTED OUTPUT</div>
  <div id="type-out"><span class="ph">Your cipher will appear here...</span></div>
  <div class="btn-row">
    <button class="btn" onclick="document.getElementById('type-input').value='';typeTranslate()">CLEAR</button>
    <button class="btn" onclick="doDownload('type-out')">DOWNLOAD PNG</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
var G = JSON.parse(document.getElementById('glyph-data').textContent);
var N = JSON.parse(document.getElementById('name-data').textContent);
var ALPHA = 'αβγδεζηθικλμνξοπρστυφχψω';

// Map latin a-x to greek
var l2g = {};
for (var i = 0; i < ALPHA.length; i++) {
  l2g[String.fromCharCode(97 + i)] = ALPHA[i];
}

function setMode(m) {
  document.getElementById('tab-build').classList.toggle('active', m === 'build');
  document.getElementById('tab-type').classList.toggle('active', m === 'type');
  document.getElementById('mode-build').classList.toggle('active', m === 'build');
  document.getElementById('mode-type').classList.toggle('active', m === 'type');
  if (m === 'type') document.getElementById('type-input').focus();
}

function makeCell(ch, clickable, onRemove) {
  var cell = document.createElement('div');
  cell.className = 'gc' + (clickable ? ' clickable' : '');
  if (clickable) cell.onclick = onRemove;
  if (ch === ' ') {
    var sp = document.createElement('div');
    sp.className = 'sp';
    cell.appendChild(sp);
  } else if (G[ch]) {
    var img = document.createElement('img');
    img.src = G[ch];
    img.alt = ch;
    img.title = N[ch] || ch;
    cell.appendChild(img);
  } else {
    var u = document.createElement('div');
    u.style.cssText = 'width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:22px;color:#d4af37;border:1px solid #333;border-radius:3px;';
    u.textContent = ch;
    cell.appendChild(u);
  }
  return cell;
}

// BUILD MODE
var buildChars = [];
function buildRender() {
  var out = document.getElementById('build-out');
  if (!buildChars.length) { out.innerHTML = '<span class="ph">Click band images below to compose...</span>'; return; }
  out.innerHTML = '';
  buildChars.forEach(function(ch, idx) {
    out.appendChild(makeCell(ch, true, (function(i) { return function() { buildChars.splice(i, 1); buildRender(); }; })(idx)));
  });
}
function buildAdd(ch) { buildChars.push(ch); buildRender(); }
function buildDelete() { buildChars.pop(); buildRender(); }
function buildClear() { buildChars = []; buildRender(); }

// TYPE MODE — accepts greek letters AND latin a-x
function typeTranslate() {
  var text = document.getElementById('type-input').value;
  var out = document.getElementById('type-out');
  if (!text) { out.innerHTML = '<span class="ph">Your cipher will appear here...</span>'; return; }
  out.innerHTML = '';
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '\n') {
      var br = document.createElement('div');
      br.style.cssText = 'width:100%;height:8px;';
      out.appendChild(br);
    } else if (ch === ' ') {
      out.appendChild(makeCell(' ', false, null));
    } else {
      // Try greek directly, else map latin
      var g = G[ch] ? ch : (l2g[ch.toLowerCase()] || null);
      if (g) out.appendChild(makeCell(g, false, null));
    }
  }
}

// DOWNLOAD — images only, NO labels
var preloaded = {};
Object.keys(G).forEach(function(k) {
  var im = new Image();
  im.src = G[k];
  preloaded[k] = im;
});

function doDownload(outId) {
  var cells = document.getElementById(outId).querySelectorAll('.gc');
  if (!cells.length) return;
  var GSIZE = 80, PAD = 20, GAP = 5;
  var perRow = Math.min(cells.length, 12);
  var rows = Math.ceil(cells.length / perRow);
  var CW = perRow * (GSIZE + GAP) - GAP + PAD * 2;
  var CH = rows * (GSIZE + GAP) - GAP + PAD * 2;
  var canvas = document.getElementById('canvas');
  canvas.width = CW; canvas.height = CH;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, CW, CH);
  var col = 0, row = 0;
  var pending = 0;
  cells.forEach(function(cell) {
    var img = cell.querySelector('img');
    var x = PAD + col * (GSIZE + GAP);
    var y = PAD + row * (GSIZE + GAP);
    if (img) {
      var ch = img.alt;
      if (preloaded[ch] && preloaded[ch].complete && preloaded[ch].naturalWidth > 0) {
        ctx.drawImage(preloaded[ch], x, y, GSIZE, GSIZE);
      } else {
        pending++;
        var tmp = new Image();
        (function(sx, sy, src) {
          tmp.onload = function() {
            ctx.drawImage(tmp, sx, sy, GSIZE, GSIZE);
            pending--;
            if (pending === 0) triggerDL(canvas);
          };
          tmp.src = src;
        })(x, y, img.src);
      }
    } else {
      // space — dark gap
      ctx.fillStyle = '#111';
      ctx.fillRect(x, y, Math.floor(GSIZE * 0.4), GSIZE);
    }
    col++;
    if (col >= perRow) { col = 0; row++; }
  });
  if (pending === 0) triggerDL(canvas);
}

function triggerDL(canvas) {
  var a = document.createElement('a');
  a.download = 'rock-cipher.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// Keyboard for build mode
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('mode-build').classList.contains('active')) return;
  if (e.ctrlKey || e.metaKey) return;
  if (e.key === 'Backspace') { e.preventDefault(); buildDelete(); }
  else if (e.key === ' ') { e.preventDefault(); buildAdd(' '); }
  else if (e.key.length === 1) {
    var g = G[e.key] ? e.key : (l2g[e.key.toLowerCase()] || null);
    if (g) buildAdd(g);
  }
});

// Build picker
var picker = document.getElementById('picker');
ALPHA.split('').forEach(function(letter) {
  var card = document.createElement('div');
  card.className = 'pc';
  card.onclick = function() { buildAdd(letter); };
  card.title = N[letter] || letter;
  if (G[letter]) {
    var img = document.createElement('img');
    img.src = G[letter];
    img.alt = letter;
    card.appendChild(img);
  }
  var lbl = document.createElement('div');
  lbl.className = 'pl';
  lbl.textContent = letter;
  card.appendChild(lbl);
  var nm = document.createElement('div');
  nm.className = 'pn';
  nm.textContent = N[letter] || '';
  card.appendChild(nm);
  picker.appendChild(card);
});
var spk = document.createElement('div');
spk.className = 'sp-key';
spk.textContent = 'SPACE';
spk.onclick = function() { buildAdd(' '); };
picker.appendChild(spk);
</script>
</body>
</html>
